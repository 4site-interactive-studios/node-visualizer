<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constellation Book Visualizer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <svg id="graph-svg"></svg>

  <aside id="detail-panel" class="panel">
    <button id="panel-close" aria-label="Close panel">&times;</button>
    <div class="panel-content">
      <div id="panel-cover"></div>
      <h2 id="panel-title"></h2>
      <p id="panel-author" class="meta"></p>
      <div id="panel-meta-row">
        <span id="panel-genre" class="tag"></span>
        <span id="panel-year" class="tag"></span>
      </div>
      <div id="panel-rating"></div>
      <p id="panel-description"></p>
      <h3>Connections</h3>
      <ul id="panel-connections"></ul>
    </div>
  </aside>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
